tailwind.config={darkMode:"class",theme:{extend:{colors:{"secondary-container":"#fed3c7","background":"#fcf9f4","surface-tint":"#3b6934","primary-fixed-dim":"#a1d494","tertiary":"#341e16","tertiary-container":"#4c332a","outline":"#72796e","surface-container-lowest":"#ffffff","surface-container":"#f0ede9","primary-container":"#154212","primary-fixed":"#bcf0ae","on-tertiary-container":"#be9b8f","surface-dim":"#dcdad5","surface-container-highest":"#e5e2dd","surface-container-high":"#ebe8e3","on-secondary":"#ffffff","outline-variant":"#c2c9bb","on-primary-container":"#7eaf73","secondary":"#77574d","on-surface-variant":"#42493e","surface-variant":"#e5e2dd","on-tertiary":"#ffffff","inverse-surface":"#31302d","on-background":"#1c1c19","surface":"#fcf9f4","on-surface":"#1c1c19","primary":"#002b02","on-primary":"#ffffff","surface-container-low":"#f6f3ee","on-secondary-container":"#795950"},fontFamily:{headline:["Noto Serif"],body:["Manrope"],label:["Manrope"]},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"}}}};

</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary-container dark:bg-[#1c1c19] dark:text-[#fcf9f4] transition-colors">

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 bg-[#fcf9f4]/80 dark:bg-[#1c1c19]/80 backdrop-blur-md shadow-sm dark:shadow-none transition-colors">
  <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-12">
      <a class="font-['Noto_Serif'] italic font-black text-2xl text-[#154212] dark:text-[#386b35]" href="index.html">Tasha Observes Birds</a>
      <div class="hidden md:flex items-center gap-8">
        <a class="font-['Noto_Serif'] font-bold text-lg text-[#77574d] dark:text-stone-400 hover:text-[#154212] dark:hover:text-[#386b35] transition-colors" href="index.html">Home</a>
        <a class="font-['Noto_Serif'] font-bold text-lg text-[#154212] dark:text-[#386b35] border-b-2 border-[#154212] dark:border-[#386b35] pb-1" href="journal.html">Journal</a>
        <a class="font-['Noto_Serif'] font-bold text-lg text-[#77574d] dark:text-stone-400 hover:text-[#154212] dark:hover:text-[#386b35] transition-colors" href="lifelist.html">Life List</a>
        <a class="font-['Noto_Serif'] font-bold text-lg text-[#77574d] dark:text-stone-400 hover:text-[#154212] dark:hover:text-[#386b35] transition-colors" href="map.html">Map</a>
      </div>
    </div>
    <button onclick="toggleTheme()" class="p-2 hover:bg-[#154212]/5 dark:hover:bg-white/5 rounded-lg transition-all" aria-label="Toggle dark mode">
      <span class="material-symbols-outlined text-[#154212] dark:text-[#386b35] dark:hidden">dark_mode</span>
      <span class="material-symbols-outlined text-[#386b35] hidden dark:inline">light_mode</span>
    </button>
  </div>
</nav>

<main class="pt-24 pb-20">

  <!-- HERO -->
  <header class="max-w-screen-2xl mx-auto px-8 mb-20">
    <div class="flex flex-col md:flex-row gap-12 items-end">
      <div class="md:w-7/12">
        <span class="text-secondary dark:text-stone-400 font-label uppercase tracking-[0.2em] text-sm mb-4 block">Field Journal</span>
        <h1 class="font-headline font-black text-6xl md:text-8xl text-primary dark:text-primary-fixed-dim leading-tight tracking-tighter italic">
          The Field<br/>Journal
        </h1>
      </div>
      <div class="md:w-5/12 pb-4">
        <p class="text-secondary dark:text-stone-400 font-body text-xl italic leading-relaxed border-l-2 border-outline-variant dark:border-stone-600 pl-6">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vivamus sagittis lacus vel augue laoreet rutrum faucibus.
        </p>
      </div>
    </div>
  </header>

  <!-- JOURNAL ENTRIES — rendered from data -->
  <section class="max-w-screen-2xl mx-auto px-8" id="journal-entries"></section>

</main>

<!-- FOOTER -->
<footer class="w-full border-t border-[#77574d]/10 dark:border-white/5 bg-[#fcf9f4] dark:bg-[#1c1c19] transition-colors">
  <div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 max-w-screen-2xl mx-auto">
    <div class="mb-8 md:mb-0">
      <span class="font-['Noto_Serif'] font-bold text-[#154212] dark:text-[#386b35] text-xl block mb-2">Tasha Observes Birds</span>
      <p class="font-['Manrope'] text-sm uppercase tracking-widest text-[#77574d] dark:text-stone-400 opacity-80">The Digital Field Journal</p>
    </div>
    <div class="flex gap-8">
      <a class="font-['Manrope'] text-sm uppercase tracking-widest text-[#77574d] dark:text-stone-400 opacity-80 hover:opacity-100" href="index.html">Home</a>
      <a class="font-['Manrope'] text-sm uppercase tracking-widest text-[#77574d] dark:text-stone-400 opacity-80 hover:opacity-100" href="lifelist.html">Life List</a>
      <a class="font-['Manrope'] text-sm uppercase tracking-widest text-[#77574d] dark:text-stone-400 opacity-80 hover:opacity-100" href="map.html">Map</a>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script>
// Group photos by date → build journal entries
const byDate = {};
PHOTOS.forEach(p => {
  const key = p.date || "Undated";
  if (!byDate[key]) byDate[key] = [];
  byDate[key].push(p);
});

const dates = Object.keys(byDate).sort((a, b) => {
  if (a === "Undated") return 1;
  if (b === "Undated") return -1;
  return b.localeCompare(a);
});

const container = document.getElementById("journal-entries");

dates.forEach((date, idx) => {
  const photos = byDate[date];
  // Find unique titles for this date
  const titles = [...new Set(photos.map(p => p.title).filter(Boolean))];
  const places = [...new Set(photos.map(p => p.place).filter(Boolean))];
  // Pick a hero image
  const hero = photos[0];
  // Remaining images (up to 5)
  const rest = photos.slice(1, 6);

  const isReversed = idx % 2 === 1;

  container.innerHTML += `
    <article class="editorial-grid mb-32 ${idx > 0 ? 'pt-16 border-t border-outline-variant/20 dark:border-white/5' : ''}">
      <!-- Hero image -->
      <div class="col-span-12 lg:col-span-8 ${isReversed ? 'lg:order-2' : ''} mb-8 lg:mb-0">
        <div class="relative group overflow-hidden rounded-lg shadow-2xl">
          <img class="w-full aspect-[16/9] object-cover transition-transform duration-700 group-hover:scale-105"
               src="${hero.src}" alt="${hero.title}" loading="lazy"/>
          ${hero.place ? `
          <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/60 to-transparent">
            <p class="text-white/90 font-label text-sm">${hero.place}</p>
          </div>` : ''}
        </div>
      </div>
      <!-- Text block -->
      <div class="col-span-12 lg:col-span-4 ${isReversed ? 'lg:order-1' : ''} flex flex-col justify-center lg:pl-8">
        <span class="text-secondary dark:text-stone-400 font-label uppercase tracking-[0.2em] text-xs mb-2 block">${date === "Undated" ? "Flickr" : date}</span>
        <h2 class="font-headline text-3xl text-primary dark:text-primary-fixed-dim mb-4">${titles.length > 0 ? titles.slice(0, 3).join(", ") : "Observations"}</h2>
        ${places.length > 0 ? `<p class="text-on-surface-variant dark:text-stone-400 text-sm leading-relaxed mb-4">${places.join(" · ")}</p>` : ''}
        <p class="text-on-surface-variant dark:text-stone-500 text-sm leading-relaxed mb-6 italic">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Cras mattis consectetur purus sit amet fermentum.
        </p>
        <p class="font-label text-xs text-secondary dark:text-stone-400 uppercase tracking-widest">${photos.length} image${photos.length > 1 ? 's' : ''} in this entry</p>
      </div>
      <!-- Thumbnail strip -->
      ${rest.length > 0 ? `
      <div class="col-span-12 grid grid-cols-2 md:grid-cols-${Math.min(rest.length, 5)} gap-4 mt-4">
        ${rest.map(r => `
          <div class="overflow-hidden rounded-lg group">
            <img class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-110"
                 src="${r.src}" alt="${r.title}" loading="lazy"/>
          </div>
        `).join('')}
      </div>` : ''}
    </article>
  `;
});
</script>
</body>
</html>
